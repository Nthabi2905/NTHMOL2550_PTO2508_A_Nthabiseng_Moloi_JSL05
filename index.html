<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Kanban Task Management</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/favicon.svg" />
  </head>

  <body
    class="font-[Plus_Jakarta_Sans] flex min-h-screen bg-[#F4F7FD] text-black"
  >
    <!-- Sidebar -->
    <nav
      id="side-bar-div"
      class="hidden md:flex flex-col bg-white border-r border-[#E4EBFA] w-[300px] h-screen"
    >
      <div class="flex justify-start m-[33px_113px_54px_34px]">
        <img src="./assets/logo-light.svg" class="w-full" />
      </div>

      <div class="flex flex-col">
        <h4 class="text-[#828FA3] text-xs tracking-widest pl-[50px] pr-3">
          ALL BOARDS (1)
        </h4>

        <button
          class="mt-2 flex items-center gap-2 bg-[#635FC7] text-white font-bold text-[15px] h-12 w-[276px] pl-[50px] rounded-r-full"
        >
          Launch Career
        </button>
      </div>
    </nav>

    <!-- Main Layout -->
    <div id="layout" class="flex-1 w-full overflow-x-hidden">
      <!-- Header -->
      <header
        class="flex items-center justify-between bg-white border-b border-[#E4EBFA] h-[96px] px-[30px] md:px-[35px]"
      >
        <div class="flex items-center">
          <img
            src="./assets/favicon.svg"
            class="block md:hidden w-[30px] h-[30px] mr-2"
          />
          <h2 id="header-board-name" class="text-xl md:text-2xl font-semibold">
            Launch Career
          </h2>
        </div>
    

        <!-- ADD TASK BUTTON -->
  <button
    id="add-task-btn"
    class="bg-[#635FC7] text-white px-5 py-2 rounded-full font-bold hover:opacity-90 transition"
  >
    + Add New Task
  </button>
      </header>

      <!-- Content -->
      <div class="flex flex-col pl-[35px] md:pl-[35px] p-4">
        <main class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <!-- TODO -->
          <div class="flex-1 min-w-[280px]">
            <div class="flex items-center gap-3 mb-6">
              <span class="w-3 h-3 rounded-full bg-todo"></span>
              <h4 class="text-sm tracking-widest text-textMuted font-semibold">
                TODO (<span id="todo-count">0</span>)
              </h4>
            </div>

            <div id="todo-column" class="space-y-4"></div>
          </div>

          <!-- DOING -->
          <div class="flex-1 min-w-[280px]">
            <div class="flex items-center gap-3 mb-6">
              <span class="w-3 h-3 rounded-full bg-doing"></span>

              <h4 class="text-sm tracking-widest text-textMuted font-semibold">
                DOING (<span id="doing-count">0</span>)
              </h4>
            </div>

            <div id="doing-column" class="space-y-4"></div>
          </div>

          <!-- DONE -->
           <div class="flex-1 min-w-[280px]">
        <div class="flex items-center gap-3 mb-6">
          <span class="w-3 h-3 rounded-full bg-done"></span>

          <h4 class="text-sm tracking-widest text-textMuted font-semibold">
            DONE (<span id="done-count">0</span>)
          </h4>
        </div>

        <div id="done-column" class="space-y-4"></div>
      </div>
    </div>

    <!-- Modal -->
    <div
      id="task-modal"
      class="fixed inset-0 bg-black/50 hidden items-center justify-center"
    >
      <div class="bg-white w-full max-w-md rounded-xl p-8 relative">
        <button
          id="close-modal-btn"
          class="absolute top-4 right-4 text-red text-xl font-bold"
        >
          &times;
        </button>

        <h2 class="text-xl font-bold mb-6">Task</h2>

        <label class="text-sm text-gray-500">Title</label>

        <input
          type="text"
          id="task-title"
          class="w-full border rounded p-2 mb-4"
        />

        <label class="text-sm text-gray-500">Description</label>

        <textarea
          id="task-desc"
          rows="4"
          class="w-full border rounded p-2 mb-4"
        ></textarea>

        <label class="text-sm text-gray-500">Status</label>

        <select id="task-status" class="w-full border rounded p-2 mb-6">
          <option value="todo">todo</option>
          <option value="doing">doing</option>
          <option value="done">done</option>
        </select>

        <button
          id="save-task-btn"
          class="bg-[#635FC7] text-white w-full py-3 rounded-full"
        >
          Save Changes
        </button>
      </div>
    </div>

    <script src="scripts.js"></script>
  </body>
</html>
